name: Kernel InfiniR A15 - SukiSU-Ultra + SUSFS (susfs_new)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (raystef66, branch 15.0)
        run: git clone --depth=1 -b 15.0 https://github.com/raystef66/kernel_xiaomi_cepheus kernel

      - name: Bersihin KSUN stock bawaan raystef66 (tree ini udah "kernelSU ready" dari awal)
        run: |
          cd kernel
          echo "=== Cek dulu apa yang ada di drivers/kernelsu sebelum dihapus ==="
          ls -la drivers/kernelsu 2>/dev/null || echo "drivers/kernelsu gak ketemu langsung, cek KernelSU-Next/ juga:"
          ls -la KernelSU-Next 2>/dev/null
          rm -rf drivers/kernelsu KernelSU-Next
          # Bersihin juga referensi lama di Makefile & Kconfig biar gak dobel entry
          sed -i '/kernelsu/d' drivers/Makefile
          sed -i '/drivers\/kernelsu\/Kconfig/d' drivers/Kconfig
          echo "=== Sisa referensi kernelsu di Makefile/Kconfig (harus kosong) ==="
          grep -i "kernelsu" drivers/Makefile drivers/Kconfig || echo "bersih"

      - name: Integrasi SukiSU-Ultra via setup.sh (jalur susfs_new, SUSFS udah bundled)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs_new
          echo "=== Cek symlink & Makefile/Kconfig hasil setup.sh ==="
          ls -la drivers/kernelsu || ls -la common/drivers/kernelsu
          grep "kernelsu" drivers/Makefile || grep "kernelsu" common/drivers/Makefile

      # CATATAN: setup.sh nge-detect folder driver otomatis (common/drivers ATAU drivers).
      # Kalau step di atas gagal nemu salah satu path, cek dulu struktur kernel/ buat pastiin
      # tree raystef66 pakai drivers/ langsung (bukan common/drivers/ ala kernel_platform baru).

      - name: Enable CONFIG_KALLSYMS wajib buat non-GKI
        run: |
          cd kernel
          grep -q "^CONFIG_KALLSYMS=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "^CONFIG_KALLSYMS_ALL=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/cepheus_defconfig
          grep "CONFIG_KALLSYMS" arch/arm64/configs/cepheus_defconfig

      - name: Enable CONFIG_KSU_MANUAL_HOOK wajib buat non-GKI (default hook method di GKI itu kprobe, di non-GKI harus manual)
        run: |
          cd kernel
          grep -q "^CONFIG_KSU=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KSU=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "^CONFIG_KSU_MANUAL_HOOK=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/cepheus_defconfig
          echo "=== Verifikasi ==="
          grep "CONFIG_KSU" arch/arm64/configs/cepheus_defconfig

      - name: (Opsional) Enable CONFIG_KPM buat fitur KPM SukiSU-Ultra
        run: |
          cd kernel
          grep -q "^CONFIG_KPM=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KPM=y" >> arch/arm64/configs/cepheus_defconfig
          grep "CONFIG_KPM" arch/arm64/configs/cepheus_defconfig

      - name: Upgrade hook call-site fs/exec.c, fs/open.c, fs/stat.c ke pola dual-hook (_hook flag + _sucompat)
        run: |
          cd kernel
          cat > /tmp/upgrade_hooks.py << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              with open(path, "r") as f:
                  content = f.read()
              if old not in content:
                  print(f"!!! PATTERN GAGAL DITEMUKAN: {label} di {path}")
                  sys.exit(1)
              if content.count(old) > 1:
                  print(f"!!! PATTERN AMBIGU (muncul >1x): {label} di {path}")
                  sys.exit(1)
              content = content.replace(old, new)
              with open(path, "w") as f:
                  f.write(content)
              print(f"[OK] {label} patched di {path}")

          # === fs/exec.c: extern declarations ===
          patch(
              "fs/exec.c",
              '// KernelSU hook\n#ifdef CONFIG_KSU\nextern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv,\n\t\t\t       void *envp, int *flags);\n#endif',
              '// KernelSU hook\n#ifdef CONFIG_KSU\nextern bool ksu_execveat_hook __read_mostly;\nextern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv,\n\t\t\t       void *envp, int *flags);\nextern int ksu_handle_execveat_sucompat(int *fd, struct filename **filename_ptr, void *argv,\n\t\t\t       void *envp, int *flags);\n#endif',
              "exec.c extern block",
          )

          # === fs/exec.c: call site ===
          patch(
              "fs/exec.c",
              '#ifdef CONFIG_KSU\n        ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);  // call KSU hook first\n#endif',
              '#ifdef CONFIG_KSU\n        if (unlikely(ksu_execveat_hook))\n                ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\n        else\n                ksu_handle_execveat_sucompat(&fd, &filename, &argv, &envp, &flags);\n#endif',
              "exec.c call site",
          )

          # === fs/open.c: extern declarations ===
          patch(
              "fs/open.c",
              '// KernelSU hook\n#ifdef CONFIG_KSU\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode,\n\t\t\t        int *flags);\n#endif',
              '// KernelSU hook\n#ifdef CONFIG_KSU\nextern bool ksu_faccessat_hook __read_mostly;\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode,\n\t\t\t        int *flags);\nextern int ksu_handle_faccessat_sucompat(int *dfd, const char __user **filename_user, int *mode,\n\t\t\t        int *flags);\n#endif',
              "open.c extern block",
          )

          # === fs/open.c: call site ===
          patch(
              "fs/open.c",
              '#ifdef CONFIG_KSU\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);  // call KSU hook first\n#endif',
              '#ifdef CONFIG_KSU\n\tif (unlikely(ksu_faccessat_hook))\n\t\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n\telse\n\t\tksu_handle_faccessat_sucompat(&dfd, &filename, &mode, NULL);\n#endif',
              "open.c call site",
          )

          # === fs/stat.c: extern declarations ===
          patch(
              "fs/stat.c",
              '// KernelSU hook\n#ifdef CONFIG_KSU\nextern int ksu_handle_stat(int *dfd, const char __user **filename_user);\n#endif',
              '// KernelSU hook\n#ifdef CONFIG_KSU\nextern bool ksu_stat_hook __read_mostly;\nextern int ksu_handle_stat(int *dfd, const char __user **filename_user);\nextern int ksu_handle_stat_sucompat(int *dfd, const char __user **filename_user);\n#endif',
              "stat.c extern block",
          )

          # === fs/stat.c: call site ===
          patch(
              "fs/stat.c",
              '#ifdef CONFIG_KSU\n        ksu_handle_stat(&dfd, &filename); // call KSU hook first\n#endif',
              '#ifdef CONFIG_KSU\n        if (unlikely(ksu_stat_hook))\n                ksu_handle_stat(&dfd, &filename);\n        else\n                ksu_handle_stat_sucompat(&dfd, &filename);\n#endif',
              "stat.c call site",
          )

          print("=== Semua hook berhasil di-upgrade ke pola dual-hook ===")
          PYEOF
          python3 /tmp/upgrade_hooks.py

      # CATATAN PENTING: step di atas ngasumsiin SukiSU-Ultra nyediain simbol
      # ksu_faccessat_hook / ksu_handle_faccessat_sucompat dan ksu_stat_hook /
      # ksu_handle_stat_sucompat, mengikuti pola penamaan yang sama kayak execveat.
      # Ini EKSTRAPOLASI dari satu contoh resmi (execveat) yang kebukti di dokumentasi,
      # BUKAN dikonfirmasi langsung dari source SukiSU-Ultra buat faccessat/stat.
      # Kalau step build kernel di bawah gagal dengan "undefined reference to
      # ksu_handle_faccessat_sucompat" atau "ksu_handle_stat_sucompat", itu tandanya
      # nama simbolnya beda di source SukiSU-Ultra - perlu dicek langsung di
      # KernelSU-Next/KernelSU/kernel/*.c hasil clone setup.sh buat nama pastinya.

        run: |
          cd kernel
          echo "=== Cek dulu apa set_memory.h udah ada & isinya cukup ==="
          find . -path "*/include/linux/set_memory.h" 2>/dev/null
          # TITIK RAWAN: kalau file di atas gak ketemu atau isinya belum punya fungsi
          # yang SukiSU-Ultra butuhin, tarik versi 4.19 manual, contoh:
          # curl -sL "https://raw.githubusercontent.com/torvalds/linux/v4.19/include/linux/set_memory.h" -o include/linux/set_memory.h
          # JANGAN auto-overwrite dulu sebelum liat log build gagal di step Build kernel,
          # biar tau persis fungsi apa yang undefined baru ditambal presisi.
          echo "Placeholder check done - lihat log build kernel dulu buat tau perlu backport apa nggak"

      - name: Backport set_memory.h dari kernel 4.19 (wajib buat kernel <4.19)
        run: |
          cd kernel
          echo "=== Cek dulu apa set_memory.h udah ada & isinya cukup ==="
          find . -path "*/include/linux/set_memory.h" 2>/dev/null
          # Konfirmasi dari run sebelumnya: file ini udah ada di tree raystef66,
          # jadi backport manual gak diperlukan. Step ini dipertahankan sebagai
          # verifikasi aja - kalau path di atas kosong, baru perlu tarik manual dari:
          # curl -sL "https://raw.githubusercontent.com/torvalds/linux/v4.19/include/linux/set_memory.h" -o include/linux/set_memory.h
          echo "Verifikasi selesai"

      - name: Update defconfig localversion
        run: |
          cd kernel
          sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="-TURTLE-SukiSU_Ultra+SUSFS"/' arch/arm64/configs/cepheus_defconfig
          grep "CONFIG_LOCALVERSION" arch/arm64/configs/cepheus_defconfig

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Fix yamltree.c (stub kosong, solusi dari TURTLE dulu - kemungkinan masih perlu)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>

          struct dt_info;

          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF
          echo "yamltree.c replaced with stub"

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1

          make O=out ARCH=arm64 cepheus_defconfig

          make ARCH=arm64 \
               O=out \
               CC=clang \
               AR=llvm-ar \
               LD=ld.lld \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb

          echo "=== Verify output ==="
          ls out/arch/arm64/boot/Image.gz-dtb
          ls out/arch/arm64/boot/Image

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cp kernel/out/arch/arm64/boot/Image kernel-pure.img
          cd AnyKernel3 && zip -r9 ../TURTLE_cepheus_SukiSUUltra_SUSFS.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TURTLE-cepheus-SukiSUUltra-SUSFS
          path: |
            TURTLE_cepheus_SukiSUUltra_SUSFS.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb
            kernel-pure.img
