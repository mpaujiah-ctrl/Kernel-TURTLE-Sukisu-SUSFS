name: Kernel InfiniR A15 - SukiSU-Ultra builtin (LSM hook) + SUSFS manual

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (raystef66, branch 15.0)
        run: git clone --depth=1 -b 15.0 https://github.com/raystef66/kernel_xiaomi_cepheus kernel

      - name: Bersihin KSUN stock bawaan raystef66 (tree ini udah "kernelSU ready" dari awal)
        run: |
          cd kernel
          echo "=== Cek dulu apa yang ada di drivers/kernelsu sebelum dihapus ==="
          ls -la drivers/kernelsu 2>/dev/null || echo "drivers/kernelsu gak ketemu langsung, cek KernelSU-Next/ juga:"
          ls -la KernelSU-Next 2>/dev/null
          rm -rf drivers/kernelsu KernelSU-Next
          sed -i '/kernelsu/d' drivers/Makefile
          sed -i '/drivers\/kernelsu\/Kconfig/d' drivers/Kconfig
          echo "=== Sisa referensi kernelsu di Makefile/Kconfig (harus kosong) ==="
          grep -i "kernelsu" drivers/Makefile drivers/Kconfig || echo "bersih"

      - name: Integrasi SukiSU-Ultra via setup.sh (jalur builtin, LSM hook - compatible kernel lama)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s dev
          echo "=== Cek symlink & Makefile/Kconfig hasil setup.sh ==="
          ls -la drivers/kernelsu || ls -la common/drivers/kernelsu
          grep "kernelsu" drivers/Makefile || grep "kernelsu" common/drivers/Makefile

      - name: Enable CONFIG_KALLSYMS wajib buat non-GKI
        run: |
          cd kernel
          grep -q "^CONFIG_KALLSYMS=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "^CONFIG_KALLSYMS_ALL=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/cepheus_defconfig
          grep "CONFIG_KALLSYMS" arch/arm64/configs/cepheus_defconfig

      - name: Enable CONFIG_KSU (branch builtin gak depends on KPROBES, jadi cukup ini doang)
        run: |
          cd kernel
          grep -q "^CONFIG_KSU=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KSU=y" >> arch/arm64/configs/cepheus_defconfig
          echo "=== Verifikasi ==="
          grep "^CONFIG_KSU=y" arch/arm64/configs/cepheus_defconfig
          # CATATAN: branch builtin pakai kernel/hook/lsm_hook.c (LSM hook), bukan
          # syscall table hook berbasis regs kayak susfs_new. Kconfig-nya gak
          # nyantumin "depends on KPROBES && EXT4_FS", jadi CONFIG_KPROBES
          # sengaja TIDAK dipaksa nyala di sini - biar gak mengulang risiko
          # kprobe-reliability yang pernah bermasalah di device ini dulu.

      - name: (Tetap dimatiin) CONFIG_KPM - folder kernel/kpm ada juga di branch ini, kemungkinan besar access_ok error yang sama
        run: |
          cd kernel
          sed -i '/^CONFIG_KPM=y/d' arch/arm64/configs/cepheus_defconfig
          echo "=== Verifikasi CONFIG_KPM gak aktif ==="
          grep "CONFIG_KPM" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KPM tidak di-set (default n) - aman"

      - name: Integrasi SUSFS manual v2.1.0 (branch builtin gak bundling SUSFS, sync dari raystef66/16.0-ksun kayak workflow KSUN)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/susfs.c" -o fs/susfs.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs.h" -o include/linux/susfs.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs_def.h" -o include/linux/susfs_def.h
          grep "SUSFS_VERSION" include/linux/susfs.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/stat.c" -o fs/stat.c
          grep -c "susfs" fs/stat.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/proc/task_mmu.c" -o fs/proc/task_mmu.c
          grep -c "susfs" fs/proc/task_mmu.c
          # FIX MENYELURUH: semua fitur di susfs.c/susfs.h dibungkus per-fitur
          # #ifdef CONFIG_KSU_SUSFS_XXX, tapi branch builtin SukiSU-Ultra cuma
          # nyediain master switch KSU_SUSFS di Kconfig, gak ada sub-option
          # individual (SUS_PATH, SUS_MOUNT, SUS_KSTAT, TRY_UMOUNT, dst) - semua
          # symbol itu gak terdaftar sama sekali, jadi "CONFIG_X=y" di defconfig
          # percuma. Solusi: paksa define semua macro ini langsung di susfs.h,
          # supaya SEMUA ifdef aktif tanpa gantung ke Kconfig, di semua file
          # (susfs.c, susfs.h, stat.c, task_mmu.c) sekaligus - bukan tambal satu-satu.
          echo "" | base64 -d | python3
          echo "=== Verifikasi define berhasil masuk ==="
          grep "^#define CONFIG_KSU_SUSFS" include/linux/susfs.h
          # Fix known bug: susfs_try_umount_all() manggil susfs_try_umount() yang
          # dibungkus #ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT. Symbol Kconfig ini TIDAK
          # terdaftar sama sekali di branch builtin (SukiSU-Ultra gak bundling
          # sub-option SUSFS individual, cuma ada master switch KSU_SUSFS), jadi
          # nyalain "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" di defconfig percuma - bakal
          # di-drop diam-diam sama Kconfig merge. Solusi: hapus langsung guard
          # ifdef/endif-nya biar fungsi selalu ke-compile, gak gantung Kconfig.
          echo "" | base64 -d | python3
          echo "=== Verifikasi susfs_try_umount sekarang unconditional ==="
          grep -B2 -A1 "^void susfs_try_umount(uid_t uid)" fs/susfs.c
          # CATATAN RISIKO: file stat.c & task_mmu.c ini disinkronkan dari branch
          # KSUN raystef66 (16.0-ksun), yang hook call-site-nya ditulis buat
          # KernelSU-Next, BUKAN buat SukiSU-Ultra builtin (LSM hook). Kalau step
          # "Build kernel" di bawah gagal linking dengan undefined reference ke
          # ksu_handle_stat/ksu_handle_faccessat dkk, itu tandanya call-site di
          # file ini perlu disesuaikan manual ke fungsi yang disediakan SukiSU-Ultra
          # branch builtin (bukan diasumsikan otomatis cocok).

      - name: Backport set_memory.h dari kernel 4.19 (wajib buat kernel <4.19)
        run: |
          cd kernel
          echo "=== Cek dulu apa set_memory.h udah ada & isinya cukup ==="
          find . -path "*/include/linux/set_memory.h" 2>/dev/null
          echo "Verifikasi selesai - kalau kosong baru perlu backport manual dari kernel.org v4.19"

      - name: Update defconfig localversion
        run: |
          cd kernel
          sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="-TURTLE-SukiSU_Ultra_Builtin+SUSFS"/' arch/arm64/configs/cepheus_defconfig
          grep "CONFIG_LOCALVERSION" arch/arm64/configs/cepheus_defconfig

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Fix yamltree.c (stub kosong, solusi dari TURTLE dulu - kemungkinan masih perlu)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>

          struct dt_info;

          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF
          echo "yamltree.c replaced with stub"

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1

          make O=out ARCH=arm64 cepheus_defconfig

          make ARCH=arm64 \
               O=out \
               CC=clang \
               AR=llvm-ar \
               LD=ld.lld \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb

          echo "=== Verify output ==="
          ls out/arch/arm64/boot/Image.gz-dtb
          ls out/arch/arm64/boot/Image

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cp kernel/out/arch/arm64/boot/Image kernel-pure.img
          cd AnyKernel3 && zip -r9 ../TURTLE_cepheus_SukiSUUltra_Builtin_SUSFS.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TURTLE-cepheus-SukiSUUltra-Builtin-SUSFS
          path: |
            TURTLE_cepheus_SukiSUUltra_Builtin_SUSFS.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb
            kernel-pure.img
            
